services:
  # Instala las dependencias de todo el monorepo una sola vez (workspaces) en un
  # volumen compartido. bot y web esperan a que termine.
  deps:
    image: node:20-alpine
    working_dir: /repo
    volumes:
      - .:/repo
      - node_modules:/repo/node_modules
    command: sh -c "npm install"

  bot:
    image: node:20-alpine
    depends_on:
      deps:
        condition: service_completed_successfully
    working_dir: /repo
    volumes:
      - .:/repo
      - node_modules:/repo/node_modules
      - data:/data
    environment:
      - DATA_PATH=/data
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm --workspace apps/bot run start:dev"

  web:
    image: node:20-alpine
    depends_on:
      deps:
        condition: service_completed_successfully
    working_dir: /repo
    volumes:
      - .:/repo
      - node_modules:/repo/node_modules
      - data:/data
      - web_next:/repo/apps/web/.next
    environment:
      - DATA_PATH=/data
      - WATCHPACK_POLLING=true
      # LICHESS_TV_USER lo carga Next.js desde apps/web/.env.local (montado en
      # el volumen). No lo declares aquí: una variable de entorno vacía
      # sobreescribiría el valor del .env.local.
    ports:
      - "3000:3000"
    command: sh -c "npm --workspace apps/web run dev"

volumes:
  node_modules:
  web_next:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data
