<!DOCTYPE html>
<!--
  MECCHA CHAMELEON · Marco de cámara (overlay transparente 1920x1080)
  La webcam en OBS va EXACTA en: Pos X=60  Pos Y=750  Tamaño 480x270.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');
  :root{--ink:#2a2433;--c1:#ff6ec7;--c2:#ffd23f;--c3:#3ddc97;--c4:#4ea8ff;--c5:#b06bff}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Fredoka',sans-serif}
  .cham{animation:cham 12s linear infinite}@keyframes cham{to{filter:hue-rotate(360deg)}}

  #cam{position:absolute;left:60px;top:680px;width:480px;height:270px}
  /* marco grueso redondeado con borde arcoíris */
  .frame{position:absolute;inset:-10px;border-radius:26px;padding:12px;
    background:conic-gradient(var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c1));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;}
  /* sombra del marco, detrás y con el centro hueco */
  .shadow{position:absolute;inset:-10px;border-radius:26px;box-shadow:0 10px 0 rgba(42,36,51,.12)}
  .frame::after{content:"";position:absolute;inset:12px;border:4px solid #fffaf2;border-radius:16px}

  /* gotas de pintura colgando del marco */
  .drip{position:absolute;bottom:-14px;width:18px;height:30px;border-radius:0 0 50% 50%;opacity:.95}
  .d1{left:60px;background:var(--c1)}.d2{left:180px;background:var(--c3);height:40px;bottom:-22px}
  .d3{left:320px;background:var(--c4)}.d4{left:420px;background:var(--c2);height:36px;bottom:-18px}

  .tab{position:absolute;top:-30px;left:14px;display:flex;align-items:center;gap:7px;height:34px;padding:0 16px;
    background:#fffaf2;border:3px solid #fff;border-radius:20px;font-weight:700;font-size:16px;color:var(--ink);
    box-shadow:0 5px 0 rgba(42,36,51,.12)}
  .tab b{font-size:18px}
  .stat{position:absolute;bottom:-32px;right:12px;display:flex;align-items:center;gap:7px;height:30px;padding:0 14px;
    background:#fffaf2;border:3px solid #fff;border-radius:18px;font-weight:700;font-size:14px;color:var(--c3);
    box-shadow:0 4px 0 rgba(42,36,51,.12)}
  .pdot{width:10px;height:10px;border-radius:50%;background:var(--c3);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.3}}
</style>
</head>
<body>
  <div id="cam">
    <div class="shadow"></div>
    <div class="frame cham"></div>
    <div class="drip d1 cham"></div><div class="drip d2 cham"></div>
    <div class="drip d3 cham"></div><div class="drip d4 cham"></div>
    <div class="tab"><b>🦎</b> EL CAMALEÓN</div>
    <div class="stat"><span class="pdot"></span>CAM ON</div>
  </div>
</body>
</html>
