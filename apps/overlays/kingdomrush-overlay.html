<!DOCTYPE html>
<!--
  KINGDOM RUSH · Overlay de Gameplay (transparente 1920x1080)
  Incluye HUD (barra superior, esquinas, ticker) + marco de cámara abajo-izquierda.
  La webcam en OBS va EXACTA en: Pos X=60  Y=680  Tamaño 480x270.
  Edita CONFIG abajo (nombre del canal, ticker).
-->
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&display=swap');
  :root{
    --gold:#e0b15c;       /* dorado heráldico */
    --wood:#3a2417;       /* madera/cuero oscuro */
    --green:#3f7a4f;      /* verde bosque */
    --cream:#f1e3c4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;
    font-family:'Cinzel','Segoe UI',serif;color:var(--cream)}
  #stage{position:absolute;inset:0}

  /* ---- esquinas angulares ---- */
  .corner{position:absolute;width:54px;height:54px;border:4px solid var(--gold)}
  .c-tl{top:26px;left:26px;border-right:0;border-bottom:0}
  .c-tr{top:26px;right:26px;border-left:0;border-bottom:0}
  .c-bl{bottom:26px;left:26px;border-right:0;border-top:0}
  .c-br{bottom:26px;right:26px;border-left:0;border-top:0}
  .corner::after{content:"";position:absolute;width:9px;height:9px;background:var(--green)}
  .c-tl::after{top:-4px;left:-4px}.c-tr::after{top:-4px;right:-4px}
  .c-bl::after{bottom:-4px;left:-4px}.c-br::after{bottom:-4px;right:-4px}

  /* ---- barra superior ---- */
  #top{position:absolute;top:30px;left:48px;right:48px;height:58px;
    display:flex;align-items:stretch;justify-content:space-between}
  .panel{display:flex;align-items:center;gap:14px;height:100%;padding:0 26px;
    background:linear-gradient(180deg,rgba(58,36,23,.94),rgba(58,36,23,.82));
    border-left:4px solid var(--gold);
    clip-path:polygon(0 0,100% 0,calc(100% - 18px) 100%,0 100%)}
  .panel.r{border-left:0;border-right:4px solid var(--gold);
    clip-path:polygon(18px 0,100% 0,100% 100%,0 100%)}
  .tag{display:grid;place-items:center;width:40px;height:40px;background:var(--gold);
    font-weight:700;font-size:22px;color:var(--wood);clip-path:polygon(0 0,100% 0,100% 78%,78% 100%,0 100%)}
  .name{font-weight:700;font-size:26px;letter-spacing:3px;text-transform:uppercase;color:#fff}
  .sub{font-weight:500;font-size:13px;letter-spacing:4px;color:var(--green);text-transform:uppercase}
  .sep{width:2px;height:28px;background:rgba(241,227,196,.25)}
  .live{display:flex;align-items:center;gap:9px;font-weight:600;font-size:17px;letter-spacing:2px;text-transform:uppercase}
  .dot{width:11px;height:11px;background:#c0392b;box-shadow:0 0 10px #c0392b;
    animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:.2}}
  #clock{font-weight:600;font-size:19px;letter-spacing:2px;color:var(--gold)}

  /* ---- línea diagonal decorativa bajo la barra ---- */
  .strike{position:absolute;top:96px;left:48px;width:260px;height:3px;background:var(--gold);
    clip-path:polygon(0 0,100% 0,calc(100% - 10px) 100%,0 100%)}

  /* ---- ticker inferior ---- */
  #bot{position:absolute;bottom:30px;left:48px;right:48px;height:46px;display:flex;align-items:stretch;
    background:linear-gradient(90deg,rgba(58,36,23,.95),rgba(58,36,23,.78));
    border-bottom:3px solid var(--gold);
    clip-path:polygon(0 0,100% 0,100% 100%,18px 100%)}
  .blabel{display:flex;align-items:center;gap:8px;padding:0 20px;background:var(--gold);color:var(--wood);
    font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;
    clip-path:polygon(0 0,100% 0,calc(100% - 16px) 100%,0 100%)}
  .track{flex:1;overflow:hidden;display:flex;align-items:center}
  .scroll{white-space:nowrap;font-weight:500;font-size:19px;letter-spacing:1px;text-transform:uppercase;
    color:var(--cream);animation:slide 26s linear infinite;padding-left:100%}
  .scroll b{color:var(--gold)}
  @keyframes slide{to{transform:translateX(-100%)}}

  /* ---- marco de cámara (60,680 -> 480x270), centro transparente ---- */
  #cam{position:absolute;left:60px;top:680px;width:480px;height:270px}
  .cf{position:absolute;background:var(--gold)}
  .cf.t{top:-3px;left:24px;right:24px;height:3px}
  .cf.b{bottom:-3px;left:24px;right:24px;height:3px}
  .cf.l{left:-3px;top:24px;bottom:24px;width:3px}
  .cf.r{right:-3px;top:24px;bottom:24px;width:3px}
  .ck{position:absolute;width:34px;height:34px;border:4px solid var(--gold)}
  .ck.tl{top:-3px;left:-3px;border-right:0;border-bottom:0}
  .ck.tr{top:-3px;right:-3px;border-left:0;border-bottom:0}
  .ck.bl{bottom:-3px;left:-3px;border-right:0;border-top:0}
  .ck.br{bottom:-3px;right:-3px;border-left:0;border-top:0}
  .ctab{position:absolute;top:-30px;left:-3px;display:flex;align-items:center;gap:8px;height:28px;padding:0 16px;
    background:var(--gold);color:var(--wood);font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;
    clip-path:polygon(0 0,100% 0,calc(100% - 12px) 100%,0 100%)}
  .cstat{position:absolute;bottom:-28px;right:-3px;display:flex;align-items:center;gap:7px;height:26px;padding:0 14px;
    background:var(--wood);color:var(--green);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;
    border-bottom:3px solid var(--gold)}
  .cdot{width:9px;height:9px;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s steps(1) infinite}
</style>
</head>
<body>
<div id="stage">
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <div id="top">
    <div class="panel">
      <div class="tag">H</div>
      <div>
        <div class="name" id="chName">HORUSER</div>
        <div class="sub">// DEFENDIENDO EL REINO</div>
      </div>
    </div>
    <div class="panel r">
      <div class="live"><span class="dot"></span>EN VIVO</div>
      <div class="sep"></div>
      <div id="clock">00:00:00</div>
    </div>
  </div>
  <div class="strike"></div>

  <div id="bot">
    <div class="blabel">▶ EN PARTIDA</div>
    <div class="track"><span class="scroll" id="ticker"></span></div>
  </div>

  <div id="cam">
    <div class="cf t"></div><div class="cf b"></div><div class="cf l"></div><div class="cf r"></div>
    <div class="ck tl"></div><div class="ck tr"></div><div class="ck bl"></div><div class="ck br"></div>
    <div class="ctab">▮ HORUSER</div>
    <div class="cstat"><span class="cdot"></span>LIVE CAM</div>
  </div>
</div>

<script>
  // ====== CONFIG ======
  const CHANNEL = "HORUSER";
  const GAME    = "KINGDOM RUSH";
  const TICKER  = "Jugando: <b>"+GAME+"</b>  //  ¡que no caiga ninguna torre!  ✦  síguenos para más oleadas  ✦  comandos: !nivel  !redes  !discord  ✦  ";
  // ====================
  document.getElementById('chName').textContent = CHANNEL;
  document.querySelector('.ctab').innerHTML = "▮ " + CHANNEL;
  document.getElementById('ticker').innerHTML = (TICKER+" ").repeat(3);
  const clk=document.getElementById('clock');
  setInterval(()=>clk.textContent=new Date().toLocaleTimeString('es-ES',{hour12:false}),1000);
</script>
</body>
</html>
