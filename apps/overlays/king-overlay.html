<!DOCTYPE html>
<!--
  THE KING IS WATCHING · HUD de Gameplay (overlay transparente 1920x1080)
  Tema: corte real / la mirada del rey. Edita CONFIG abajo (canal, juego, ticker).
-->
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --night:#160c2e; --night2:#2a1a4a; --gold:#f5c542; --gold2:#ffe08a;
    --royal:#8b5cff; --royal2:#b89bff; --crimson:#e23e57; --parch:#f3e7c9; --ink:#1c1233;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;
    font-family:'Nunito',sans-serif;color:var(--parch)}

  /* esquinas con filigrana dorada */
  .corner{position:absolute;width:120px;height:120px;border:3px solid var(--gold);opacity:.55}
  .c-tl{top:22px;left:22px;border-right:0;border-bottom:0;border-radius:14px 0 0 0}
  .c-tr{top:22px;right:22px;border-left:0;border-bottom:0;border-radius:0 14px 0 0}
  .c-bl{bottom:22px;left:22px;border-right:0;border-top:0;border-radius:0 0 0 14px}
  .c-br{bottom:22px;right:22px;border-left:0;border-top:0;border-radius:0 0 14px 0}

  /* barra superior */
  #top{position:absolute;top:30px;left:46px;right:46px;height:72px;
    display:flex;align-items:center;justify-content:space-between}
  .panel{display:flex;align-items:center;gap:14px;height:100%;padding:0 24px;
    background:linear-gradient(180deg,rgba(42,26,74,.94),rgba(22,12,46,.94));
    border:2px solid rgba(245,197,66,.55);border-radius:12px;
    box-shadow:0 8px 0 rgba(0,0,0,.30), inset 0 0 22px rgba(139,92,255,.18)}
  .badge{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:26px;
    background:radial-gradient(circle at 50% 35%,var(--gold2),var(--gold) 70%);
    box-shadow:0 3px 0 rgba(0,0,0,.30),0 0 14px rgba(245,197,66,.5)}
  .name{font-family:'Cinzel';font-weight:700;font-size:26px;letter-spacing:1px;color:var(--parch);line-height:1}
  .sub{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.5px}
  .sep{width:2px;height:32px;border-radius:2px;background:rgba(245,197,66,.35)}
  .live{display:flex;align-items:center;gap:9px;font-family:'Cinzel';font-weight:700;font-size:18px;letter-spacing:1px}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--crimson);
    box-shadow:0 0 0 4px rgba(226,62,87,.25);animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:.25}}
  #clock{font-family:'Cinzel';font-size:20px;color:var(--gold2)}
  .crest{display:flex;gap:8px;font-size:18px}

  /* ticker inferior */
  #bot{position:absolute;bottom:30px;left:46px;right:46px;height:56px;display:flex;align-items:stretch;
    background:linear-gradient(180deg,rgba(42,26,74,.94),rgba(22,12,46,.94));
    border:2px solid rgba(245,197,66,.55);border-radius:12px;overflow:hidden;
    box-shadow:0 8px 0 rgba(0,0,0,.30)}
  .tag{display:flex;align-items:center;gap:8px;padding:0 24px;font-family:'Cinzel';font-weight:700;font-size:18px;letter-spacing:1px;
    color:var(--night);background:linear-gradient(180deg,var(--gold2),var(--gold));border-radius:10px 0 0 10px}
  .track{flex:1;overflow:hidden;display:flex;align-items:center}
  .scroll{white-space:nowrap;font-family:'Nunito';font-weight:700;font-size:21px;color:var(--parch);
    animation:slide 24s linear infinite;padding-left:100%}
  .scroll b{color:var(--gold)}
  @keyframes slide{to{transform:translateX(-100%)}}
</style>
</head>
<body>
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <div id="top">
    <div class="panel">
      <div class="badge">👑</div>
      <div>
        <div class="name" id="chName">TU_CANAL</div>
        <div class="sub">su majestad observa</div>
      </div>
    </div>
    <div class="panel">
      <div class="live"><span class="dot"></span>EN VIVO</div>
      <div class="sep"></div>
      <div id="clock">00:00:00</div>
      <div class="sep"></div>
      <div class="crest">🛡️⚔️👑</div>
    </div>
  </div>

  <div id="bot">
    <div class="tag">👁 EN PARTIDA</div>
    <div class="track"><span class="scroll" id="ticker"></span></div>
  </div>

<script>
  // ====== CONFIG ======
  const CHANNEL = "TU_CANAL";
  const GAME    = "THE KING IS WATCHING";
  const TICKER  = "Jugando: <b>"+GAME+"</b> 👑  el rey observa su reino…  ✦  ¡síguenos y únete a la corte!  ✦  !redes  !discord  ✦  ";
  // ====================
  document.getElementById('chName').textContent = CHANNEL;
  document.getElementById('ticker').innerHTML = (TICKER+" ").repeat(3);
  const clk=document.getElementById('clock');
  setInterval(()=>clk.textContent=new Date().toLocaleTimeString('es-ES',{hour12:false}),1000);
</script>
</body>
</html>
