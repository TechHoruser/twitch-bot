<!DOCTYPE html>
<!-- KINGDOM RUSH · Pantalla "EMPEZAMOS PRONTO" (fullscreen 1920x1080). Cuenta atrás en CONFIG. -->
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=MedievalSharp&display=swap');
  :root{--gold:#e0b15c;--wood:#3a2417;--wood2:#52331f;--green:#3f7a4f;--cream:#f1e3c4}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;font-family:'Cinzel',serif;color:var(--cream)}
  #bg{position:absolute;inset:0;background:
      radial-gradient(1100px 700px at 50% 38%, var(--wood2), var(--wood) 70%), var(--wood)}
  #grid{position:absolute;inset:0;opacity:.4;
    background-image:linear-gradient(rgba(224,177,92,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(224,177,92,.07) 1px,transparent 1px);
    background-size:54px 54px}
  .diag{position:absolute;width:160%;height:120px;background:linear-gradient(90deg,transparent,rgba(224,177,92,.10),transparent);
    transform:rotate(-8deg);left:-30%}
  .d1{top:140px;animation:sweep 7s linear infinite}
  @keyframes sweep{0%{transform:translateX(-20%) rotate(-8deg)}100%{transform:translateX(20%) rotate(-8deg)}}
  .scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 2px,transparent 2px 4px);opacity:.5}
  .vign{position:absolute;inset:0;box-shadow:inset 0 0 320px rgba(0,0,0,.85)}

  .corner{position:absolute;width:84px;height:84px;border:5px solid var(--gold)}
  .tl{top:40px;left:40px;border-right:0;border-bottom:0}.tr{top:40px;right:40px;border-left:0;border-bottom:0}
  .bl{bottom:40px;left:40px;border-right:0;border-top:0}.br{bottom:40px;right:40px;border-left:0;border-top:0}
  .corner::after{content:"";position:absolute;width:12px;height:12px;background:var(--green)}
  .tl::after{top:-5px;left:-5px}.tr::after{top:-5px;right:-5px}.bl::after{bottom:-5px;left:-5px}.br::after{bottom:-5px;right:-5px}

  #wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;z-index:2}
  .kicker{display:flex;align-items:center;gap:12px;font-weight:600;font-size:22px;letter-spacing:8px;text-transform:uppercase;color:#fff;
    background:var(--green);padding:8px 28px;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%)}
  h1{font-weight:800;font-size:120px;line-height:.95;letter-spacing:3px;text-transform:uppercase;color:#fff;margin:10px 0 0;
    text-shadow:0 0 30px rgba(224,177,92,.4)}
  h1 span{color:var(--gold)}
  .subt{font-weight:600;font-size:22px;letter-spacing:7px;text-transform:uppercase;color:var(--gold)}
  .game{margin-top:2px;font-weight:600;font-size:24px;letter-spacing:5px;color:var(--cream);opacity:.8;text-transform:uppercase}

  #count{font-weight:700;font-size:62px;letter-spacing:6px;color:#fff;margin-top:24px;padding:10px 36px;
    background:var(--wood2);border:2px solid var(--gold);
    clip-path:polygon(16px 0,100% 0,calc(100% - 16px) 100%,0 100%)}

  #load{margin-top:28px;width:580px;height:14px;background:var(--wood2);border:1px solid rgba(224,177,92,.5);overflow:hidden;
    clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
  #load>div{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));animation:fill 2.6s ease-in-out infinite}
  @keyframes fill{0%{width:6%}50%{width:94%}100%{width:6%}}
  .boot{margin-top:14px;font-weight:500;font-size:18px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.85;font-family:'MedievalSharp',cursive}

  #foot{position:absolute;bottom:60px;left:0;right:0;display:flex;justify-content:center;gap:30px;z-index:2}
  .soc{display:flex;align-items:center;gap:10px;background:var(--wood2);border-left:3px solid var(--gold);padding:10px 22px;
    font-weight:600;font-size:18px;letter-spacing:2px;text-transform:uppercase}
  .soc b{color:var(--gold)}
</style>
</head>
<body>
  <div id="bg"></div><div id="grid"></div><div class="diag d1"></div><div class="scan"></div><div class="vign"></div>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

  <div id="wrap">
    <div class="kicker">▶ Reuniendo a las tropas</div>
    <h1>EMPEZAMOS <span>PRONTO</span></h1>
    <div class="subt">levantando las torres del reino</div>
    <div class="game">// KINGDOM RUSH</div>
    <div id="count">--:--</div>
    <div id="load"><div></div></div>
    <div class="boot" id="boot">afilando las lanzas…</div>
  </div>

  <div id="foot">
    <span class="soc">TWITCH <b id="tw">/HORUSER</b></span>
    <span class="soc">YOUTUBE <b id="yt">/HORUSER</b></span>
    <span class="soc">DISCORD <b id="dc">/HORUSER</b></span>
  </div>

<script>
  // ====== CONFIG ======
  const MINUTOS = 5;          // cuenta atrás (0 = ocultar)
  const HANDLE  = "HORUSER";
  // ====================
  tw.textContent=yt.textContent=dc.textContent="/"+HANDLE;
  const boots=["afilando las lanzas…","reclutando arqueros…","cargando los catapultas…","bendiciendo a los magos…","esperando refuerzos…"];
  let bi=0;setInterval(()=>boot.textContent=boots[bi=(bi+1)%boots.length],2200);
  const el=document.getElementById('count');
  if(MINUTOS<=0){el.style.display='none';}
  else{let end=Date.now()+MINUTOS*60000;const t=()=>{let s=Math.max(0,Math.round((end-Date.now())/1000));
    el.textContent=s>0?String(Math.floor(s/60)).padStart(2,'0')+":"+String(s%60).padStart(2,'0'):"¡A LAS ARMAS!";};t();setInterval(t,1000);}
</script>
</body>
</html>
