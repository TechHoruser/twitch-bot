<!DOCTYPE html>
<!-- MECCHA CHAMELEON · Pantalla "VUELVO YA" (fullscreen 1920x1080) -->
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700&display=swap');
  :root{--ink:#2a2433;--paper:#fffaf2;--c1:#ff6ec7;--c2:#ffd23f;--c3:#3ddc97;--c4:#4ea8ff;--c5:#b06bff}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;font-family:'Nunito',sans-serif;color:var(--ink)}
  .cham{animation:cham 12s linear infinite}@keyframes cham{to{filter:hue-rotate(360deg)}}
  #bg{position:absolute;inset:0;background:radial-gradient(900px 600px at 50% 42%, #fff, var(--paper) 70%),var(--paper)}
  #dots{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(78,168,255,.18) 3px, transparent 3px);background-size:46px 46px}
  .splash{position:absolute;border-radius:46% 54% 60% 40%/50% 44% 56% 50%;opacity:.85;animation:float 9s ease-in-out infinite}
  @keyframes float{50%{transform:translateY(-22px) rotate(10deg)}}
  .s1{width:190px;height:190px;background:var(--c2);top:140px;left:180px}
  .s2{width:150px;height:150px;background:var(--c3);top:220px;right:210px;animation-delay:-3s}
  .s3{width:130px;height:130px;background:var(--c1);bottom:170px;left:300px;animation-delay:-5s}
  .s4{width:160px;height:160px;background:var(--c5);bottom:130px;right:260px;animation-delay:-2s}

  #wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;z-index:2}
  .lemon{font-size:120px;animation:peek 3s ease-in-out infinite}
  @keyframes peek{0%,100%{transform:translateY(20px) rotate(-6deg)}50%{transform:translateY(-10px) rotate(6deg)}}
  .kicker{font-family:'Fredoka';font-weight:600;font-size:22px;color:#fff;background:var(--c4);padding:8px 26px;border-radius:30px;box-shadow:0 6px 0 rgba(42,36,51,.12)}
  h1{font-family:'Fredoka';font-weight:700;font-size:112px;line-height:1;color:var(--ink);margin:6px 0;text-shadow:0 6px 0 rgba(78,168,255,.18)}
  h1 span{color:var(--c4)}
  .subt{font-family:'Fredoka';font-weight:600;font-size:30px;color:var(--c1)}
  .boot{margin-top:14px;font-family:'Fredoka';font-weight:500;font-size:20px;color:var(--ink);opacity:.7}
  #foot{position:absolute;bottom:54px;left:0;right:0;display:flex;justify-content:center;gap:18px;z-index:2}
  .soc{display:flex;align-items:center;gap:8px;background:#fff;padding:10px 22px;border-radius:24px;font-family:'Fredoka';font-weight:600;font-size:19px;box-shadow:0 5px 0 rgba(42,36,51,.10)}
  .soc b{color:var(--c1)}
</style>
</head>
<body>
  <div id="bg"></div><div id="dots"></div>
  <div class="splash s1 cham"></div><div class="splash s2 cham"></div><div class="splash s3 cham"></div><div class="splash s4 cham"></div>
  <div id="wrap">
    <div class="lemon">🦎</div>
    <div class="kicker">pausa rápida</div>
    <h1>¡VUELVO <span>YA!</span></h1>
    <div class="subt">me estoy repintando 🎨</div>
    <div class="boot" id="boot">no te vayas, ahora vuelvo…</div>
  </div>
  <div id="foot">
    <span class="soc">🟣 Twitch <b id="tw">/HORUSER</b></span>
    <span class="soc">🔴 YouTube <b id="yt">/HORUSER</b></span>
    <span class="soc">💬 Discord <b id="dc">/HORUSER</b></span>
  </div>
<script>
  const HANDLE="HORUSER";
  tw.textContent=yt.textContent=dc.textContent="/"+HANDLE;
  const boots=["no te vayas, ahora vuelvo…","cambiando de color…","mira el chat mientras tanto 💬","preparando la próxima ronda…","camuflaje recargando 🦎"];
  let i=0;setInterval(()=>boot.textContent=boots[i=(i+1)%boots.length],2400);
</script>
</body>
</html>
